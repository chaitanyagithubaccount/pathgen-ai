server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: pathgen-api
  codec:
    max-in-memory-size: 10MB

gemini:
  api:
    key: ${GEMINI_API_KEY:}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent

cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}

logging:
  level:
    com.pathgen: DEBUG
